<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donation Media</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="donationContainer" class="donation-container hidden">
        <!-- الفيديو -->
        <video id="donationVideo" class="donation-video">
            <source src="" type="video/mp4">
        </video>
        
        <!-- الموسيقى -->
        <audio id="donationMusic" class="donation-music">
            <source src="" type="audio/mpeg">
        </audio>
        
        <!-- معلومات التبرع -->
        <div class="donation-info">
            <h1 id="donationMessage">شكراً على تبرعك!</h1>
            <p id="donationAmount">المبلغ: $100</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
